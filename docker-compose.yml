services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apiaryhub-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: ${APP_URL:-http://127.0.0.1:8000}
      APP_AUTO_SEED: "${APP_AUTO_SEED:-false}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
      SESSION_DOMAIN: ${SESSION_DOMAIN:-127.0.0.1}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-127.0.0.1:8000,localhost:8000}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-127.0.0.1,::1}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-apiaryhub}}
      DB_USERNAME: ${MYSQL_USER:-${DB_USERNAME:-apiaryhub}}
      DB_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-change_me}}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      MAIL_QUEUE: mail
      MAIL_MAILER: smtp
      MAIL_SCHEME: null
      MAIL_ENCRYPTION: null
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_EHLO_DOMAIN: ${MAIL_EHLO_DOMAIN:-127.0.0.1}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@apiaryhub.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ApiaryHub}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:8000}
    volumes:
      - .:/var/www/html
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8000}:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apiaryhub-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      APP_RUNTIME: worker
      RUN_MIGRATIONS: "false"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: "${APP_DEBUG:-true}"
      APP_URL: ${APP_URL:-http://127.0.0.1:8000}
      APP_AUTO_SEED: "${APP_AUTO_SEED:-false}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-false}"
      SESSION_DOMAIN: ${SESSION_DOMAIN:-127.0.0.1}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-127.0.0.1:8000,localhost:8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-apiaryhub}}
      DB_USERNAME: ${MYSQL_USER:-${DB_USERNAME:-apiaryhub}}
      DB_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-change_me}}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      QUEUE_WORKER_QUEUE: ${QUEUE_WORKER_QUEUE:-mail,default}
      QUEUE_WORKER_SLEEP: ${QUEUE_WORKER_SLEEP:-3}
      QUEUE_WORKER_TRIES: ${QUEUE_WORKER_TRIES:-3}
      QUEUE_WORKER_TIMEOUT: ${QUEUE_WORKER_TIMEOUT:-120}
      QUEUE_WORKER_MAX_TIME: ${QUEUE_WORKER_MAX_TIME:-3600}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      MAIL_QUEUE: mail
      MAIL_MAILER: smtp
      MAIL_SCHEME: null
      MAIL_ENCRYPTION: null
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_EHLO_DOMAIN: ${MAIL_EHLO_DOMAIN:-127.0.0.1}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@apiaryhub.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ApiaryHub}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:8000}
    volumes:
      - .:/var/www/html

  vite:
    image: node:22-alpine
    container_name: apiaryhub-vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "if [ ! -d node_modules/vite ]; then npm ci; fi && npm run dev -- --host 0.0.0.0 --port ${VITE_DEV_PORT:-5173}"
    environment:
      VITE_DEV_PORT: ${VITE_DEV_PORT:-5173}
      VITE_DEV_SERVER_URL: ${VITE_DEV_SERVER_URL:-http://localhost:5173}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_HMR_PORT: ${VITE_HMR_PORT:-5173}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-true}
    volumes:
      - .:/var/www/html
      - vite_node_modules:/var/www/html/node_modules
    ports:
      - "${VITE_BIND:-127.0.0.1}:${VITE_DEV_PORT:-5173}:5173"

  mysql:
    image: mysql:8.4
    container_name: apiaryhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-${DB_DATABASE:-apiaryhub}}
      MYSQL_USER: ${MYSQL_USER:-${DB_USERNAME:-apiaryhub}}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-${DB_PASSWORD:-change_me}}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
    ports:
      - "${MYSQL_BIND:-127.0.0.1}:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: apiaryhub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: apiaryhub-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_BIND:-127.0.0.1}:${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_BIND:-127.0.0.1}:${MAILPIT_WEB_PORT:-8025}:8025"

volumes:
  mysql_data:
  redis_data:
  vite_node_modules:
