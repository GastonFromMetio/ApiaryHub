services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: ${APP_URL:-https://apiaryhub.fr}
      APP_AUTO_SEED: "${APP_AUTO_SEED:-false}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
      SESSION_DOMAIN: ${SESSION_DOMAIN:-apiaryhub.fr}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-apiaryhub.fr,www.apiaryhub.fr}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-*}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-apiaryhub}
      DB_USERNAME: ${DB_USERNAME:-apiaryhub}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      MAIL_QUEUE: ${MAIL_QUEUE:-mail}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtp}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_HOST: ${MAIL_HOST:-smtp-relay.brevo.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_EHLO_DOMAIN: ${MAIL_EHLO_DOMAIN:-apiaryhub.fr}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@apiaryhub.fr}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ApiaryHub}
      FRONTEND_URL: ${FRONTEND_URL:-https://apiaryhub.fr}
    expose:
      - "8000"
    networks:
      - apiaryhub-internal
      - dokploy-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_RUNTIME: worker
      RUN_MIGRATIONS: "false"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: ${APP_URL:-https://apiaryhub.fr}
      APP_AUTO_SEED: "${APP_AUTO_SEED:-false}"
      SESSION_SECURE_COOKIE: "${SESSION_SECURE_COOKIE:-true}"
      SESSION_DOMAIN: ${SESSION_DOMAIN:-apiaryhub.fr}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-apiaryhub.fr,www.apiaryhub.fr}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-apiaryhub}
      DB_USERNAME: ${DB_USERNAME:-apiaryhub}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      QUEUE_WORKER_QUEUE: ${QUEUE_WORKER_QUEUE:-mail,default}
      QUEUE_WORKER_SLEEP: ${QUEUE_WORKER_SLEEP:-3}
      QUEUE_WORKER_TRIES: ${QUEUE_WORKER_TRIES:-3}
      QUEUE_WORKER_TIMEOUT: ${QUEUE_WORKER_TIMEOUT:-120}
      QUEUE_WORKER_MAX_TIME: ${QUEUE_WORKER_MAX_TIME:-3600}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      MAIL_QUEUE: ${MAIL_QUEUE:-mail}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_SCHEME: ${MAIL_SCHEME:-smtp}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_HOST: ${MAIL_HOST:-smtp-relay.brevo.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_EHLO_DOMAIN: ${MAIL_EHLO_DOMAIN:-apiaryhub.fr}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@apiaryhub.fr}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ApiaryHub}
      FRONTEND_URL: ${FRONTEND_URL:-https://apiaryhub.fr}
    networks:
      - apiaryhub-internal

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-apiaryhub}
      MYSQL_USER: ${DB_USERNAME:-apiaryhub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password-db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password-db}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - apiaryhub-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - apiaryhub-internal

volumes:
  mysql_data:
  redis_data:

networks:
  apiaryhub-internal:
  dokploy-network:
    external: true
